name: LumenLingo
options:
  bundleIdPrefix: com.sebastiansiemianowski
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: ""

targets:
  LumenLingo:
    type: application
    platform: iOS
    sources:
      - path: LumenLingo
        excludes:
          - "**/.DS_Store"
    resources:
      - path: LumenLingo/Resources
        buildPhase: resources
    settings:
      base:
        INFOPLIST_GENERATION_MODE: GeneratedFile
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        PRODUCT_BUNDLE_IDENTIFIER: com.sebastiansiemianowski.lumenlingo
        PRODUCT_NAME: LumenLingo
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: true
        CODE_SIGN_STYLE: Automatic

  LumenLingoTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LumenLingoTests
    dependencies:
      - target: LumenLingo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sebastiansiemianowski.lumenlingo.tests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/LumenLingo.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/LumenLingo"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  LumenLingo:
    build:
      targets:
        LumenLingo: all
        LumenLingoTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - LumenLingoTests
