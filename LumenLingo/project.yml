name: LumenLingo
options:
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true

# ─── Build Configurations (10 total: 5 envs × Debug/Release) ──
configs:
  Dev-Debug: debug
  Dev-Release: release
  QA-Debug: debug
  QA-Release: release
  UAT-Debug: debug
  UAT-Release: release
  PreProd-Debug: debug
  PreProd-Release: release
  Prod-Debug: debug
  Prod-Release: release

targets:
  LumenLingo:
    type: application
    platform: iOS
    sources:
      - path: LumenLingo
        excludes:
          - "**/.DS_Store"
          - "*.entitlements"
    resources:
      - path: LumenLingo/Resources/Assets.xcassets
        buildPhase: resources
    info:
      path: LumenLingo/Info.plist
      properties:
        UIBackgroundModes:
          - audio
        CADisableMinimumFrameDurationOnPhone: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations: {}
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        LLEnvironment: $(LL_ENVIRONMENT)
        LLApiBaseURL: $(LL_API_BASE_URL)
        LLLogLevel: $(LL_LOG_LEVEL)
    settings:
      base: {}
        # TODO: Re-enable once iCloud entitlement is provisioned (see ICloud-sync.md)
        # CODE_SIGN_ENTITLEMENTS: LumenLingo/LumenLingo.entitlements
    configFiles:
      Dev-Debug: Config/Dev-Debug.xcconfig
      Dev-Release: Config/Dev-Release.xcconfig
      QA-Debug: Config/QA-Debug.xcconfig
      QA-Release: Config/QA-Release.xcconfig
      UAT-Debug: Config/UAT-Debug.xcconfig
      UAT-Release: Config/UAT-Release.xcconfig
      PreProd-Debug: Config/PreProd-Debug.xcconfig
      PreProd-Release: Config/PreProd-Release.xcconfig
      Prod-Debug: Config/Prod-Debug.xcconfig
      Prod-Release: Config/Prod-Release.xcconfig

  LumenLingoTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LumenLingoTests
    dependencies:
      - target: LumenLingo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(PRODUCT_BUNDLE_IDENTIFIER).tests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/$(PRODUCT_NAME).app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/$(PRODUCT_NAME)"
        BUNDLE_LOADER: "$(TEST_HOST)"

# ─── Schemes (one per environment) ────────────────────────────
schemes:
  LumenLingo-Dev:
    build:
      targets:
        LumenLingo: all
        LumenLingoTests: [test]
    run:
      config: Dev-Debug
      environmentVariables:
        - variable: LL_ENVIRONMENT
          value: dev
          isEnabled: true
    test:
      config: Dev-Debug
      targets:
        - LumenLingoTests
    profile:
      config: Dev-Release
    analyze:
      config: Dev-Debug
    archive:
      config: Dev-Release

  LumenLingo-QA:
    build:
      targets:
        LumenLingo: all
        LumenLingoTests: [test]
    run:
      config: QA-Debug
      environmentVariables:
        - variable: LL_ENVIRONMENT
          value: qa
          isEnabled: true
    test:
      config: QA-Debug
      targets:
        - LumenLingoTests
    profile:
      config: QA-Release
    analyze:
      config: QA-Debug
    archive:
      config: QA-Release

  LumenLingo-UAT:
    build:
      targets:
        LumenLingo: all
        LumenLingoTests: [test]
    run:
      config: UAT-Debug
      environmentVariables:
        - variable: LL_ENVIRONMENT
          value: uat
          isEnabled: true
    test:
      config: UAT-Debug
      targets:
        - LumenLingoTests
    profile:
      config: UAT-Release
    analyze:
      config: UAT-Debug
    archive:
      config: UAT-Release

  LumenLingo-PreProd:
    build:
      targets:
        LumenLingo: all
        LumenLingoTests: [test]
    run:
      config: PreProd-Debug
      environmentVariables:
        - variable: LL_ENVIRONMENT
          value: preprod
          isEnabled: true
    test:
      config: PreProd-Debug
      targets:
        - LumenLingoTests
    profile:
      config: PreProd-Release
    analyze:
      config: PreProd-Debug
    archive:
      config: PreProd-Release

  LumenLingo-Prod:
    build:
      targets:
        LumenLingo: all
        LumenLingoTests: [test]
    run:
      config: Prod-Debug
      environmentVariables:
        - variable: LL_ENVIRONMENT
          value: prod
          isEnabled: true
    test:
      config: Prod-Debug
      targets:
        - LumenLingoTests
    profile:
      config: Prod-Release
    analyze:
      config: Prod-Debug
    archive:
      config: Prod-Release
