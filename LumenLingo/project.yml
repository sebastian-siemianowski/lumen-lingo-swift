name: LumenLingo
options:
  bundleIdPrefix: com.sebastiansiemianowski
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    DEVELOPMENT_TEAM: ""

targets:
  LumenLingo:
    type: application
    platform: iOS
    sources:
      - path: LumenLingo
        excludes:
          - "**/.DS_Store"
    resources:
      - path: LumenLingo/Resources/Assets.xcassets
        buildPhase: resources
    info:
      path: LumenLingo/Info.plist
      properties:
        UIBackgroundModes:
          - audio
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations: {}
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sebastiansiemianowski.lumenlingo
        PRODUCT_NAME: LumenLingo
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: true
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: LumenLingo/LumenLingo.entitlements

  LumenLingoTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LumenLingoTests
    dependencies:
      - target: LumenLingo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sebastiansiemianowski.lumenlingo.tests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/LumenLingo.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/LumenLingo"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  LumenLingo:
    build:
      targets:
        LumenLingo: all
        LumenLingoTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - LumenLingoTests
