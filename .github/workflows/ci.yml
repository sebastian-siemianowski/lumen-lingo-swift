name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: lumen-lingo-frontend/package-lock.json
      - run: npm ci
        working-directory: lumen-lingo-frontend
      - run: npm run lint
        working-directory: lumen-lingo-frontend

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: lumen-lingo-frontend/package-lock.json
      - run: npm ci
        working-directory: lumen-lingo-frontend
      - run: npm test
        working-directory: lumen-lingo-frontend

  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: lumen-lingo-frontend/package-lock.json
      - run: npm ci
        working-directory: lumen-lingo-frontend
      - run: npx playwright install --with-deps chromium
        working-directory: lumen-lingo-frontend
      - run: npm run build
        working-directory: lumen-lingo-frontend
      - run: npm run test:e2e -- --project=chromium
        working-directory: lumen-lingo-frontend
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: lumen-lingo-frontend/test-results/
          retention-days: 7

  translations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: lumen-lingo-frontend/package-lock.json
      - run: npm ci
        working-directory: lumen-lingo-frontend
      - run: node scripts/check-translations.js
        working-directory: lumen-lingo-frontend

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: lumen-lingo-frontend/package-lock.json
      - run: npm ci
        working-directory: lumen-lingo-frontend
      - run: npm run build
        working-directory: lumen-lingo-frontend
