name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: lumen-lingo-frontend/package-lock.json
      - run: npm ci
        working-directory: lumen-lingo-frontend
      - run: npm run lint
        working-directory: lumen-lingo-frontend

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: lumen-lingo-frontend/package-lock.json
      - run: npm ci
        working-directory: lumen-lingo-frontend
      - run: npm test
        working-directory: lumen-lingo-frontend

  e2e-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1/4, 2/4, 3/4, 4/4]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: lumen-lingo-frontend/package-lock.json
      - run: npm ci
        working-directory: lumen-lingo-frontend
      - run: npx playwright install --with-deps chromium
        working-directory: lumen-lingo-frontend
      - run: npm run build
        working-directory: lumen-lingo-frontend
      - run: npx playwright test --project=chromium --shard=${{ matrix.shard }}
        working-directory: lumen-lingo-frontend
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-blob-${{ strategy.job-index }}
          path: lumen-lingo-frontend/blob-report/
          retention-days: 7

  e2e-report:
    if: always() && needs.e2e-tests.result != 'skipped'
    needs: e2e-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: lumen-lingo-frontend/package-lock.json
      - run: npm ci
        working-directory: lumen-lingo-frontend
      - uses: actions/download-artifact@v4
        with:
          pattern: playwright-blob-*
          path: lumen-lingo-frontend/all-blob-reports
          merge-multiple: true
      - run: npx playwright merge-reports --reporter=html ./all-blob-reports
        working-directory: lumen-lingo-frontend
      - uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: lumen-lingo-frontend/playwright-report/
          retention-days: 14

  translations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: lumen-lingo-frontend/package-lock.json
      - run: npm ci
        working-directory: lumen-lingo-frontend
      - run: npm run check:translations
        working-directory: lumen-lingo-frontend

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: lumen-lingo-frontend/package-lock.json
      - run: npm ci
        working-directory: lumen-lingo-frontend
      - run: npm run build
        working-directory: lumen-lingo-frontend

  ios-tests:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen and xcbeautify
        run: brew install xcodegen xcbeautify
      - name: Generate Xcode project
        run: cd LumenLingo && xcodegen generate
      - name: Run iOS unit tests
        run: |
          set -o pipefail
          cd LumenLingo && xcodebuild test \
            -project LumenLingo.xcodeproj \
            -scheme LumenLingo-Dev \
            -destination 'platform=iOS Simulator,OS=latest' \
            -parallel-testing-enabled YES \
            -resultBundlePath ../build/TestResults.xcresult \
            | xcbeautify
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-test-results
          path: build/TestResults.xcresult
          retention-days: 7
