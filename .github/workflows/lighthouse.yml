name: Lighthouse CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'lumen-lingo-frontend/**'

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: lumen-lingo-frontend/package-lock.json

      - run: npm ci
        working-directory: lumen-lingo-frontend

      - run: npm run build
        working-directory: lumen-lingo-frontend

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: lumen-lingo-frontend/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
